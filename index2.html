<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 예산 관리 시스템 (구글 시트 연동)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- 구성은 동일하되 JS가 GAS 연동으로 바뀝니다 -->
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center"><h1 class="text-3xl font-bold">📊 팀 예산 관리 시스템</h1></header>
        <div class="flex border-b border-gray-200 mb-8">
            <button onclick="switchTab('input')" id="tab-input" class="px-6 py-2 font-semibold tab-active">데이터 입력</button>
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-6 py-2 font-semibold text-gray-500">대시보드</button>
        </div>

        <div id="section-input" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 card p-6">
                <form id="budgetForm" class="space-y-4">
                    <select id="member" class="w-full border p-2 rounded" required>
                        <option value="">팀원 선택</option><option value="부장님">부장님</option><option value="팀원1">팀원1</option>
                    </select>
                    <input type="month" id="month" class="w-full border p-2 rounded" required>
                    <select id="category" class="w-full border p-2 rounded" required>
                        <option value="수선유지비">수선유지비</option><option value="비품">비품</option>
                    </select>
                    <input type="number" id="amount" placeholder="금액" class="w-full border p-2 rounded" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">저장</button>
                </form>
            </div>
            <div class="md:col-span-2 card p-6">
                <table class="w-full">
                    <thead><tr class="bg-gray-50 text-left text-xs"><th>날짜</th><th>팀원</th><th>항목</th><th>금액</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
        <div id="section-dashboard" class="hidden">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxxS1vuHQZIvLnCIKGWZM4sgMB3bqALPkP3bC_lqEwLqE23NoJoWvFyXARO_GSvylBmHQ/exec"; // 여기에 배포된 URL 입력

        async function fetchData() {
            const res = await fetch(GAS_URL);
            return await res.json();
        }

        document.getElementById('budgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                member: document.getElementById('member').value,
                month: document.getElementById('month').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            };
            
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            alert('저장 완료');
            loadData();
        });

        async function loadData() {
            const data = await fetchData();
            // 데이터 렌더링 로직 (위의 기존 로직과 동일하게 연결)
        }
        
        loadData();
    </script>
</body>
</html>
